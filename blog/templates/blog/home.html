{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookHub — Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {margin: 0;font-family: 'Rajdhani', sans-serif;background: linear-gradient(135deg, #ff6200, #ff3d00);color: white;text-align: center;}

        .hero {min-height: 100vh;display: flex;flex-direction: column;justify-content: center;align-items: center;}

        h1 {font-family: 'Bebas Neue', cursive;font-size: 4rem;letter-spacing: 3px;margin-bottom: 1rem;}

        p {font-size: 1.2rem;max-width: 600px;margin-bottom: 2rem;}

        .nav-links {list-style: none;padding: 0;}

        .nav-links li {display: inline-block;margin: 0 15px;}

        .nav-links a {text-decoration: none;color: white;background: black;padding: 10px 25px;border-radius: 5px;font-weight: 600;transition: 0.3s;}

        .nav-links a:hover {background: white;color: #ff3d00;}

        footer {position: absolute;bottom: 20px;width: 100%;font-size: 0.9rem;opacity: 0.8;}
    </style>
</head>
<body>

<div class="hero">
    <h1>Welcome to BookHub</h1>

    <p>
        Discover, share, and explore amazing books.  
        Post your own book content and connect with readers around the world.
    </p>

    <ul class="nav-links">
        <ul><a href="{% url 'about' %}">About</a> | <a href="{% url 'post_list' %}">Post_Details</a></ul>
    </ul>
</div>

<footer>
    © 2026 BookHub · Share Knowledge With The World
</footer>

</body>
</html>
